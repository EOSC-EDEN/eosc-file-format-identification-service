<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>File Format Identification — EOSC EDEN</title>
  <link rel="icon" type="image/svg+xml" href="/logo-eden.svg" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f6f8;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 1.2rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    header h1 { font-size: 1.2rem; font-weight: 600; }
    header span { font-size: 0.85rem; opacity: 0.6; }

    main {
      flex: 1;
      max-width: 780px;
      width: 100%;
      margin: 2.5rem auto;
      padding: 0 1.5rem;
    }

    /* Drop zone */
    #drop-zone {
      border: 2.5px dashed #b0b8cc;
      border-radius: 12px;
      background: #fff;
      padding: 3rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
    }
    #drop-zone.drag-over {
      border-color: #4f6ef7;
      background: #f0f3ff;
    }
    #drop-zone .icon { font-size: 2.8rem; margin-bottom: .75rem; }
    #drop-zone p { color: #555; font-size: 1rem; }
    #drop-zone p strong { color: #4f6ef7; cursor: pointer; }
    #file-input { display: none; }

    /* Spinner */
    #spinner {
      display: none;
      text-align: center;
      padding: 2.5rem;
    }
    .spin {
      width: 44px; height: 44px;
      border: 4px solid #e0e4f0;
      border-top-color: #4f6ef7;
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Result card */
    #result { display: none; margin-top: 2rem; }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,.07);
      margin-bottom: 1.25rem;
      overflow: hidden;
    }
    .card-header {
      padding: .85rem 1.25rem;
      font-weight: 600;
      font-size: .95rem;
      background: #f8f9fc;
      border-bottom: 1px solid #eaecf2;
      display: flex;
      align-items: center;
      gap: .5rem;
    }
    .card-body { padding: 1.25rem; }

    /* Outcome badge */
    .badge {
      display: inline-block;
      padding: .25rem .7rem;
      border-radius: 999px;
      font-size: .78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .badge-success { background: #dcfce7; color: #166534; }
    .badge-warning { background: #fef9c3; color: #854d0e; }
    .badge-failure { background: #fee2e2; color: #991b1b; }

    /* Primary result */
    .primary-format { font-size: 1.5rem; font-weight: 700; margin-bottom: .5rem; }
    .primary-sub { color: #555; font-size: .95rem; margin-bottom: 1rem; }

    .id-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: .75rem;
    }
    .id-chip {
      background: #f0f3ff;
      border-radius: 8px;
      padding: .6rem .9rem;
    }
    .id-chip .scheme {
      font-size: .7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: #4f6ef7;
      margin-bottom: .2rem;
    }
    .id-chip .value { font-size: .92rem; font-family: monospace; }
    .id-chip a { color: inherit; text-decoration: underline dotted; }

    /* File meta */
    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: .5rem 2rem;
      font-size: .88rem;
      color: #444;
    }
    .meta-row span b { color: #1a1a2e; }

    /* Tool breakdown table */
    .tool-table {
      width: 100%;
      border-collapse: collapse;
      font-size: .86rem;
    }
    .tool-table th {
      text-align: left;
      font-size: .7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: #4f6ef7;
      padding: .4rem .75rem .4rem 0;
      border-bottom: 2px solid #eaecf2;
      white-space: nowrap;
    }
    .tool-table td {
      padding: .65rem .75rem .65rem 0;
      border-bottom: 1px solid #f0f0f0;
      vertical-align: top;
    }
    .tool-table tr:last-child td { border-bottom: none; }
    .tool-table .col-tool { font-weight: 600; color: #1a1a2e; }
    .tool-table .col-tool small { display: block; font-weight: 400; color: #888; font-size: .78rem; }
    .tool-table .col-format { color: #333; }
    .tool-table .col-format small { display: block; color: #888; font-size: .78rem; }
    .tool-table .col-id {
      font-family: monospace;
      font-size: .82rem;
      color: #1a1a2e;
    }
    .tool-table .col-id a { color: inherit; text-decoration: underline dotted; }
    .tool-table .col-id.empty { color: #ccc; }

    /* Warnings */
    .warning-item {
      background: #fffbeb;
      border-left: 3px solid #f59e0b;
      padding: .6rem .9rem;
      border-radius: 0 6px 6px 0;
      font-size: .87rem;
      margin-bottom: .5rem;
    }

    /* Error */
    #error {
      display: none;
      background: #fee2e2;
      border-radius: 10px;
      padding: 1.25rem;
      margin-top: 1.5rem;
      color: #991b1b;
      font-size: .93rem;
    }

    /* Try again */
    #try-again {
      display: none;
      margin-top: 1.5rem;
      text-align: center;
    }
    button.try-again-btn {
      background: #4f6ef7;
      color: #fff;
      border: none;
      padding: .7rem 1.8rem;
      border-radius: 8px;
      font-size: .95rem;
      cursor: pointer;
      font-weight: 600;
    }
    button.try-again-btn:hover { background: #3a57d4; }

    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: .8rem;
      color: #999;
    }
    footer a { color: #4f6ef7; text-decoration: none; }
  </style>
</head>

  <div>
    <h1>File Format Identification</h1>
    <span>EOSC EDEN · Multi-engine PRONOM / MIME / Wikidata identification</span>
  </div>
</header>

<main>

  <div id="drop-zone">
    <div class="icon">📄</div>
    <p>Drag &amp; drop a file here, or <strong id="browse-link">browse to upload</strong></p>
    <p style="margin-top:.5rem;font-size:.83rem;color:#888">Any file type</p>
    <input type="file" id="file-input" />
  </div>

  <div id="spinner">
    <div class="spin"></div>
    <p style="color:#555">Identifying file…</p>
  </div>

  <div id="error"></div>

  <div id="result">

    <div class="card">
      <div class="card-header" id="result-header">📋 Identification Result</div>
      <div class="card-body">
        <div class="primary-format" id="format-name"></div>
        <div class="primary-sub" id="format-sub"></div>
        <div class="id-grid" id="id-grid"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">📁 File Details</div>
      <div class="card-body">
        <div class="meta-row" id="file-meta"></div>
      </div>
    </div>

    <div id="warnings-card" class="card" style="display:none">
      <div class="card-header">⚠️ Warnings</div>
      <div class="card-body" id="warnings-body"></div>
    </div>

    <div class="card">
      <div class="card-header">🔬 Tool Breakdown</div>
      <div class="card-body" id="tool-breakdown"></div>
    </div>

  </div>

  <div id="try-again">
    <button class="try-again-btn" id="try-again-btn">Identify another file</button>
  </div>

</main>

<footer>
  <a href="/docs" target="_blank">API Documentation</a> ·
  <a href="https://github.com/EOSC-EDEN/eosc-file-format-identification-tool" target="_blank">Source Code</a>
</footer>

<script>
  const dropZone   = document.getElementById('drop-zone');
  const fileInput  = document.getElementById('file-input');
  const browseLink = document.getElementById('browse-link');
  const spinner    = document.getElementById('spinner');
  const resultDiv  = document.getElementById('result');
  const errorDiv   = document.getElementById('error');
  const tryAgain   = document.getElementById('try-again');

  // ── Friendly names for tools ───────────────────────────────────────────────
  const TOOL_LABELS = {
    siegfried: 'Byte Signature Analysis',
    magika:    'AI Content Analysis',
    tika:      'Document Content Analysis',
  };

  // ── Human-readable outcome explanations ───────────────────────────────────
  const OUTCOME_DESC = {
    success: 'The format was identified with high confidence.',
    warning: 'The format was identified but with some uncertainty — for example, the file extension did not match the file content.',
    failure: 'The format could not be reliably identified.',
  };

  // ── Human-readable warning codes ──────────────────────────────────────────
  function friendlyWarning(code, message) {
    if (code === 'EXTENSION_MISMATCH')
      return 'The file extension did not match the actual file content. The format was identified by analysing the file itself, not its name.';
    if (code === 'MULTIPLE_MATCHES')
      return 'More than one possible format was found. The most likely match is shown above.';
    if (code === 'NO_MATCH')
      return 'None of the identification engines could match this file to a known format.';
    return message;
  }

  // ── Human-readable identification method ──────────────────────────────────
  function friendlyMethod(method) {
    const map = {
      'byte signature':    'matched by byte signature',
      'container signature': 'matched by container structure',
      'xml structure':     'matched by XML structure',
      'ai/probabilistic':  'identified by AI content analysis',
      'mime magic':        'matched by MIME magic bytes',
      'extension':         'matched by file extension',
    };
    return map[method] || method;
  }

  browseLink.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) identifyFile(fileInput.files[0]);
  });

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    if (e.dataTransfer.files[0]) identifyFile(e.dataTransfer.files[0]);
  });

  document.getElementById('try-again-btn').addEventListener('click', reset);

  function reset() {
    fileInput.value = '';
    dropZone.style.display = '';
    spinner.style.display = 'none';
    resultDiv.style.display = 'none';
    errorDiv.style.display = 'none';
    tryAgain.style.display = 'none';
  }

  async function identifyFile(file) {
    dropZone.style.display = 'none';
    spinner.style.display = 'block';
    resultDiv.style.display = 'none';
    errorDiv.style.display = 'none';
    tryAgain.style.display = 'none';

    const form = new FormData();
    form.append('file', file);

    try {
      const resp = await fetch('/identify', { method: 'POST', body: form });
      const data = await resp.json();
      if (!resp.ok) throw new Error(data.detail || `HTTP ${resp.status}`);
      renderResult(file, data);
    } catch (err) {
      errorDiv.textContent = '✗ ' + (err.message || 'Something went wrong. Please try again.');
      errorDiv.style.display = 'block';
    } finally {
      spinner.style.display = 'none';
      tryAgain.style.display = 'block';
    }
  }

  function fmt_bytes(n) {
    if (n == null) return '—';
    if (n < 1024) return n + ' B';
    if (n < 1048576) return (n/1024).toFixed(1) + ' KB';
    return (n/1048576).toFixed(2) + ' MB';
  }

  function renderResult(file, d) {
    const outcome = d.provenance?.outcome || 'unknown';
    const primary = d.primary_identifier;

    // ── Header badge + outcome explanation ──────────────────────────────────
    const badgeClass = outcome === 'success' ? 'badge-success'
                     : outcome === 'warning' ? 'badge-warning' : 'badge-failure';
    document.getElementById('result-header').innerHTML =
      `📋 Identification Result &nbsp;<span class="badge ${badgeClass}">${outcome}</span>`;

    // ── Primary format name — combine name + MIME for context ────────────────
    const toolWithName = d.provenance?.tools?.find(t => t.format_name);
    const rawName = toolWithName?.format_name || primary?.value || 'Unknown format';
    const formatVersion = toolWithName?.format_version ? ` ${toolWithName.format_version}` : '';
    const mimeId = d.identifiers?.find(i => i.scheme === 'MIME');
    // If format name looks like a bare short code (no spaces, ≤ 10 chars), enrich it with MIME
    const isBareName = rawName.length <= 10 && !rawName.includes(' ');
    const displayName = (isBareName && mimeId)
      ? `${rawName.toUpperCase()} (${mimeId.value})`
      : rawName + formatVersion;
    document.getElementById('format-name').textContent = displayName;

    // ── Outcome explanation ──────────────────────────────────────────────────
    const basisText = d.basis ? `Identified by ${friendlyMethod(d.basis)}` : '';
    const outcomeText = OUTCOME_DESC[outcome] || '';
    document.getElementById('format-sub').textContent =
      [basisText, outcomeText].filter(Boolean).join(' · ');

    // ── Identifier chips (clickable PRONOM links) ────────────────────────────
    const grid = document.getElementById('id-grid');
    grid.innerHTML = '';
    const allIds = d.identifiers?.length ? d.identifiers : (primary ? [primary] : []);
    const seen = new Set();
    allIds.forEach(id => {
      const key = id.scheme + ':' + id.value;
      if (seen.has(key)) return;
      seen.add(key);
      const chip = document.createElement('div');
      chip.className = 'id-chip';
      const valHtml = id.uri
        ? `<a href="${id.uri}" target="_blank" rel="noopener">${id.value}</a>`
        : id.value;
      chip.innerHTML = `<div class="scheme">${id.scheme}</div><div class="value">${valHtml}</div>`;
      grid.appendChild(chip);
    });

    // ── File meta ────────────────────────────────────────────────────────────
    const checksum = d.checksum_sha256
      ? `<b>SHA-256:</b> <span style="font-family:monospace;font-size:.82rem">${d.checksum_sha256}</span>`
      : '';
    document.getElementById('file-meta').innerHTML =
      `<span><b>Filename:</b> ${d.filename || file.name}</span>
       <span><b>Size:</b> ${fmt_bytes(d.filesize ?? file.size)}</span>
       ${checksum ? `<span>${checksum}</span>` : ''}`;

    // ── Warnings (plain English) ─────────────────────────────────────────────
    if (d.warnings?.length) {
      const wb = document.getElementById('warnings-body');
      wb.innerHTML = d.warnings.map(w =>
        `<div class="warning-item">${friendlyWarning(w.code, w.message)}</div>`
      ).join('');
      document.getElementById('warnings-card').style.display = 'block';
    }

    // ── Tool breakdown — aligned table ───────────────────────────────────────
    const tb = document.getElementById('tool-breakdown');
    tb.innerHTML = '';
    const tools = d.provenance?.tools || [];

    // Collect all identifier schemes present across all tools (preserve order)
    const schemeOrder = ['PRONOM', 'MIME', 'LOC', 'WIKIDATA'];
    const schemes = [];
    tools.forEach(t => (t.identifiers || []).forEach(i => {
      if (!schemes.includes(i.scheme)) schemes.push(i.scheme);
    }));
    // Put known schemes first, then any others
    const orderedSchemes = [
      ...schemeOrder.filter(s => schemes.includes(s)),
      ...schemes.filter(s => !schemeOrder.includes(s)),
    ];

    const table = document.createElement('table');
    table.className = 'tool-table';

    // Header row
    const thead = table.createTHead();
    const hrow = thead.insertRow();
    ['Tool', 'Format identified', ...orderedSchemes, 'Method'].forEach(h => {
      const th = document.createElement('th');
      th.textContent = h;
      hrow.appendChild(th);
    });

    // Data rows
    const tbody = table.createTBody();
    tools.forEach(tool => {
      const tr = tbody.insertRow();

      // Tool name cell
      const friendly = TOOL_LABELS[tool.name];
      const td0 = tr.insertCell();
      td0.className = 'col-tool';
      td0.innerHTML = friendly
        ? `${friendly}<small>(${tool.name}${tool.version ? ' v'+tool.version : ''})</small>`
        : tool.name;

      // Format cell
      const td1 = tr.insertCell();
      td1.className = 'col-format';
      if (tool.error) {
        td1.innerHTML = `<span style="color:#c00">Could not complete: ${tool.error}</span>`;
      } else if (tool.format_name) {
        td1.innerHTML = tool.format_name
          + (tool.format_version ? `<small>${tool.format_version}</small>` : '');
      } else {
        td1.textContent = '—';
      }

      // One cell per scheme
      const idMap = {};
      (tool.identifiers || []).forEach(i => { idMap[i.scheme] = i; });
      orderedSchemes.forEach(scheme => {
        const td = tr.insertCell();
        const id = idMap[scheme];
        td.className = 'col-id' + (id ? '' : ' empty');
        if (id) {
          td.innerHTML = id.uri
            ? `<a href="${id.uri}" target="_blank" rel="noopener">${id.value}</a>`
            : id.value;
        } else {
          td.textContent = '—';
        }
      });

      // Method cell
      const tdm = tr.insertCell();
      tdm.className = 'col-format';
      tdm.textContent = tool.method ? friendlyMethod(tool.method) : '—';
    });

    tb.appendChild(table);

    resultDiv.style.display = 'block';
  }
</script>
</body>
</html>
